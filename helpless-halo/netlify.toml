[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Content-Security-Policy = "default-src 'self'; style-src 'self'; form-action 'self' https://www.musicstudio-ziebart.de/; script-src 'self' https://www.googletagmanager.com 'unsafe-inline'; frame-src 'self' https://www.youtube.com; font-src 'self'; connect-src 'self'; img-src 'self'; base-uri 'self';"